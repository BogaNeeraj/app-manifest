spec:
  serviceName: mysqldb
  replicas: 1

  selector:
    matchLabels:
      app: app-database

  template:
    metadata:
      labels:
        app: app-database
    spec:
      containers:
      - name: cont1
        image: chintu98/phpdb:dbimage
        ports:
        - containerPort: 3306


        envFrom:
        - secretRef:
            name: bankapp-db-secret

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"

        volumeMounts:
        - name: pvc-1
          mountPath: /usr/share/nginx/html/

  volumeClaimTemplates:
  - metadata:
      name: pvc-1
    spec:
      accessModes:
      - ReadWriteOnce
      storageClassName: gp2
      resources:
        requests:
          storage: 2Gi