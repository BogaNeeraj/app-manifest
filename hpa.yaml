apiversion: autoscaling/v2
kind: HorizantalPodAutoscalar
metadata:
  name: bankapp-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/1
    kind: Deployment
    name: myapp
  minReplicas: 3
  maxReplicas: 7
  metrics:
  - type: Resource
    resource:
     name: cpu
     target: 
      type: Utilization
      averageUtilization: 60